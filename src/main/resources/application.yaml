spring:
  application:
    name: api

  datasource:
    url: jdbc:mysql://localhost/volimed_api
    username: root
    password: ${DB_PASSWORD}

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  web:
    error:
      include-stacktrace: never

api:
  security:
    token:
      secret: ${JWT_SECRET:12345678}